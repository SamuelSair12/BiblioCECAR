<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioCECAR – Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="pantalla-login">

    <div class="tarjeta-login">

        <div class="logo-login">
            <div class="icono-logo">📚</div>
            <h1>Biblio<span>CECAR</span></h1>
            <p>Sistema de Gestión de Biblioteca</p>
        </div>

        <div id="msg-login" class="msg-login"></div>

        <div class="campo">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" placeholder="ejemplo@cecar.edu.co" maxlength="100">
        </div>

        <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" maxlength="50">
        </div>

        <div class="campo">
            <label for="rol">Rol de Acceso</label>
            <select id="rol">
                <option value="">-- Seleccione un rol --</option>
                <option value="1">Administrador</option>
                <option value="2">Bibliotecario</option>
                <option value="3">Invitado</option>
            </select>
        </div>

        <button class="btn-ingresar" id="btn-ingresar" onclick="autenticar()">
            Ingresar al Sistema
        </button>

        <p class="version-sistema">v1.0 · CECAR 2026</p>
    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
